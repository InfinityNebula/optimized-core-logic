<!DOCTYPE html>
<html>
<head>
  <title>Fake Benchmark</title>
</head>
<body style="background:#0d1117; color:#58a6ff; font-family:monospace; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
  <p>>>> Initializing Neural_Engine_V3...</p>
  <p id="line2" style="display:none">>>> Loading Tensor Weights [7b_optimized]...</p>
  <p id="line3" style="display:none">>>> Compiling C++ Inference Kernels...</p>
  <p id="line4" style="display:none">>>> Success. Click to verify performance metrics.</p>
  <button id="startBtn" style="display:none; background:#238636; color:white; padding:10px 20px; border:none; cursor:pointer; margin-top:10px;">Run Benchmark.sh</button>

  <script>
    setTimeout(()=>document.getElementById('line2').style.display='block', 800);
    setTimeout(()=>document.getElementById('line3').style.display='block', 1600);
    setTimeout(()=>{
      document.getElementById('line4').style.display='block';
      const btn = document.getElementById('startBtn');
      btn.style.display='block';
      btn.onclick = () => {
        // ✅ Redirect user to YouTube in full browser window
        window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
      };
    }, 2400);
  </script>
</body>
</html>
